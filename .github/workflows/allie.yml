name: Allie accessibility evidence

# Dogfoods Allie's host-agnostic consumer contract against the Vanity homepage.
# Every PR (and pushes to master) clones + builds the public Allie CLI, serves
# the static site, runs `allie verify` — which captures deterministic axe
# evidence AND an agentic (vision-model) review of every criterion that needs
# judgment — uploads the full evidence packet, and posts the report summary as a
# PR comment. The job's pass/fail reflects Allie's own release projection: a
# deterministic WCAG failure blocks (red check) by design. This is evidence
# visibility for accessibility review, not a legal compliance guarantee.

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  allie:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vanity
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        run: rustup update stable && rustup default stable

      - name: Install Allie (public consumer contract)
        run: |
          git clone --depth 1 https://github.com/adminifi-ai/allie .allie/tooling/allie
          cargo install --path .allie/tooling/allie --locked
          cd .allie/tooling/allie
          npm ci
          npx playwright install --with-deps chromium

      - name: Serve Vanity (static, port 4174)
        run: |
          python3 -m http.server 4174 --bind 127.0.0.1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4174/ >/dev/null; then
              echo "vanity is up"
              break
            fi
            sleep 1
          done

      - name: Run allie verify
        id: verify
        continue-on-error: true
        env:
          ALLIE_BROWSER_WORKER: ${{ github.workspace }}/.allie/tooling/allie/workers/browser/run.mjs
          ALLIE_AGENTIC_WORKER: ${{ github.workspace }}/.allie/tooling/allie/workers/agentic/review.mjs
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set +e
          allie verify --manifest .allie/manifest.yml --out .allie/verify/latest --project-root .
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload Allie evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allie-verify
          path: .allie/verify/latest

      - name: Comment Allie report on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- allie-verify-report -->';
            let summary = '_Allie produced no summary — see the run logs._';
            try {
              summary = fs.readFileSync('.allie/verify/latest/reporters/allie-report.md', 'utf8');
            } catch (error) {
              core.warning(`could not read Allie summary: ${error}`);
            }
            const body = [
              marker,
              summary,
              '',
              '---',
              'Full evidence packet — screenshot, axe JSON, WCAG drilldown, release projection — is attached as the **allie-verify** artifact on this run.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Reflect Allie status
        if: always()
        run: |
          code="${{ steps.verify.outputs.exit_code }}"
          echo "allie verify exit code: ${code:-<none>}"
          test "${code:-1}" = "0"
