<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phaedrus</title>
  <meta name="description" content="Independent systems engineering. I build agents, the tools to build agents, and the tools to build the tools.">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fcfcfc">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
  <script>
    (() => {
      const saved = localStorage.getItem('ae-mode');
      if (saved === 'dark' || saved === 'light') {
        document.documentElement.dataset.aeMode = saved;
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/misty-step/aesthetic@v2.0.1/aesthetic.css">
</head>
<body>
  <div class="ae-screen">
    <main class="ae-stage">
      <div class="ae-view">
        <div class="ae-group">
          <h1 class="ae-name">PHAEDRUS</h1>
        </div>
        <p class="ae-lede ae-group">I build agents, the tools to build agents, and
        the tools to build the tools.</p>
        <div class="ae-group">
          <p><a class="ae-accent" href="https://www.mistystep.io/">misty step</a>
            <span class="ae-dim">my engineering firm</span></p>
          <p><a href="https://github.com/phrazzld">github</a></p>
          <p><a href="mailto:phaedrus.raznikov@pm.me">email</a></p>
        </div>
      </div>
    </main>
    <footer class="ae-bar">
      <p class="ae-dim">&copy; 2026 Phaedrus</p>
      <button class="ae-mode" id="mode" aria-label="Toggle color mode">mode</button>
    </footer>
  </div>
  <script>
    document.getElementById('mode').addEventListener('click', () => {
      const root = document.documentElement;
      const dark = root.dataset.aeMode
        ? root.dataset.aeMode === 'dark'
        : matchMedia('(prefers-color-scheme: dark)').matches;
      const next = dark ? 'light' : 'dark';
      root.dataset.aeMode = next;
      localStorage.setItem('ae-mode', next);
    });
  </script>
</body>
</html>
