id: vanity-home-allie
name: Vanity homepage Allie evidence
app_name: Vanity
environment: local
target:
  kind: web
  base_url: http://127.0.0.1:4174
policy:
  profile: wcag22-aa
  blocking_classes:
    - deterministic
    - scripted
artifacts:
  redaction_status: not_redacted_local_static_site
  retention_class: repo_dogfood_artifact
model:
  enabled: true
  provider_allowlist:
    - openrouter
  zdr_required: false
  redaction: none
  provider: openrouter
  # Latest-gen vision reviewer. In an A/B on this site's captured evidence under a
  # forced pass/fail prompt, 3.5 Flash was the ONLY model that correctly failed the
  # real low-contrast icons; every cheaper option (Gemini 3.1 Flash-Lite, Qwen3-VL
  # 235B/32B, GLM-4.6V) rubber-stamped it as pass. DeepSeek is text-only (no vision).
  # ~$0.08/PR. "low" thinking keeps full coverage + decisiveness without medium's cost.
  model: google/gemini-3.5-flash
  reasoning_effort: low
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  max_model_calls: 8
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 720
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: vanity-home-flow
  description: Vanity homepage
  states:
    - id: home
      path: /
      description: Vanity homepage
      required: true
      axe: true
      screenshot: true
      dom_snapshot: true
      accessibility_tree: true
      keyboard: true
      video: false
      trace: false
