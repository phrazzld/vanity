id: vanity-home-allie-allie-generated
name: Vanity Allie generated product-surface flow
app_name: Vanity
environment: local
auth_profile: null
credentials:
  profile: null
  provider: none
  env: null
  required: false
target:
  kind: web
  fixture_dir: null
  base_url: http://127.0.0.1:4174
policy:
  profile: wcag22-aa
  blocking_classes:
  - deterministic
  - scripted
  worker_timeout_ms: 30000
artifacts:
  redaction_status: not_redacted_local_static_site
  retention_class: repo_dogfood_artifact
model:
  enabled: false
  provider_allowlist: []
  zdr_required: true
known_nondeterminism: []
browser:
  viewport:
    width: 1280
    height: 720
  color_scheme: light
  reduced_motion: reduce
  locale: en-US
  zoom: 1.0
flow:
  id: allie-generated-product-surface-flow
  description: Generated from the Allie product map. Replay before enforcement.
  states:
  - id: home
    path: /
    description: Vanity homepage
    required: true
    axe: true
    screenshot: true
    dom_snapshot: true
    accessibility_tree: true
    keyboard: true
    video: false
    trace: true
    promotion_state: generated_candidate
